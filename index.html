<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星芽冒险</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-panel" aria-label="星芽冒险游戏区域">
        <div class="topbar">
          <div>
            <p class="eyebrow">星芽冒险</p>
            <h1>跑、跳、收集星光</h1>
          </div>
          <div class="hud" aria-live="polite">
            <span><b id="score">0</b> 分</span>
            <span><b id="coins">0</b> 星</span>
            <span><b id="lives">3</b> 命</span>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="game" width="1280" height="720" aria-label="平台跳跃游戏画布"></canvas>
          <div id="overlay" class="overlay">
            <div>
              <p id="overlayKicker">准备出发</p>
              <h2 id="overlayTitle">星芽冒险</h2>
              <p id="overlayText">方向键或 A/D 移动，空格或 W 跳跃。踩掉影团，冲到右侧光门。</p>
              <button id="startBtn" type="button">开始游戏</button>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="control-cluster">
            <button class="pad" data-control="left" aria-label="向左">←</button>
            <button class="pad" data-control="right" aria-label="向右">→</button>
          </div>
          <button class="jump" data-control="jump" aria-label="跳跃">跳</button>
        </div>
      </section>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
